<!DOCTYPE html>
<html>
<head>
    <title>Add Lead</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">LeadFlow</span>
</nav>

<div class="container mt-5">
    <div class="card shadow p-4">
        <h3>Add New Lead</h3>

        <form method="POST">
            <input class="form-control mb-2" name="name" placeholder="Name" required>
            <input class="form-control mb-2" name="company" placeholder="Company" required>
            <input class="form-control mb-2" name="linkedin" placeholder="LinkedIn URL">

            <select class="form-control mb-2" name="status">
                <option>Not Contacted</option>
                <option>Messaged</option>
                <option>Replied</option>
                <option>Closed</option>
            </select>

            <textarea class="form-control mb-2" name="notes" placeholder="Notes"></textarea>

            <label>Meeting Date</label>
            <input type="date" name="meeting_date" class="form-control mb-2">

            <label>Meeting Time</label>
            <input type="time" name="meeting_time" class="form-control mb-3">

            <button class="btn btn-success">Add Lead</button>
            <a href="/" class="btn btn-secondary">Back</a>
        </form>
    </div>
</div>

</body>
</html>
